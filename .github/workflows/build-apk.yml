name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apk-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Node-Abhängigkeiten installieren
        run: npm install --no-audit --no-fund

      - name: Web-App nach www kopieren
        run: |
          mkdir -p www
          cp -r index.html manifest.json sw.js css js icons fonts www/
          # Caller-Sprachclips, falls vorhanden
          [ -d audio ] && cp -r audio www/ || echo "kein audio-Ordner – Caller nutzt die System-Stimme"

      - name: Android-Plattform erzeugen
        run: npx cap add android

      - name: Kamera-Berechtigung für den QR-Scanner eintragen
        run: |
          python3 - <<'PY'
          import re, pathlib
          f = pathlib.Path('android/app/src/main/AndroidManifest.xml')
          x = f.read_text()
          perms = ('    <uses-permission android:name="android.permission.CAMERA" />\n'
                   '    <uses-feature android:name="android.hardware.camera" android:required="false" />\n')
          if 'android.permission.CAMERA' not in x:
              x = x.replace('</manifest>', perms + '</manifest>')
              f.write_text(x)
              print('Kamera-Berechtigung ergänzt')
          else:
              print('Kamera-Berechtigung war bereits vorhanden')
          PY

      - name: App-Icons und Splashscreen generieren
        run: >
          npx @capacitor/assets generate --android
          --iconBackgroundColor '#0F1D16'
          --iconBackgroundColorDark '#0F1D16'
          --splashBackgroundColor '#0F1D16'
          --splashBackgroundColorDark '#0F1D16'

      - name: Capacitor synchronisieren
        run: npx cap sync android

      - name: APK bauen
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: APK umbenennen
        run: cp android/app/build/outputs/apk/debug/app-debug.apk One80.apk

      - name: APK als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: One80-apk
          path: One80.apk

      - name: APK als Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk
          name: One80 – Android-App (APK)
          body: |
            Automatisch gebaute Android-App (aktuellster Stand).

            **Installation am Handy:**
            1. `One80.apk` unten herunterladen
            2. Die Datei antippen
            3. Falls gefragt: Installation aus dieser Quelle erlauben
          files: One80.apk
